name: Build Jellyfin AndroidTV - Luxia Theme

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Luxia theme patch from your fork
        run: |
          curl -L https://raw.githubusercontent.com/Activusto/jellyfin-androidtv-Subtitle-Offset/master/jellyfin-androidtv-luxia-theme.patch -o luxia-theme.patch

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Apply Luxia theme patch (verbose)
        run: |
          echo "=== Applying Luxia theme patch ==="
          git apply --verbose luxia-theme.patch 2>&1 || git apply --stat luxia-theme.patch
          echo "=== Patch apply complete ==="

      - name: Decode keystore
        run: echo "$KEYSTORE_B64" | base64 -d > keystore.jks
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}

      - name: Create gradle.properties
        run: |
          echo "keystore.file=../keystore.jks" >> gradle.properties
          echo "keystore.password=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "signing.key.alias=${{ secrets.KEY_ALIAS }}" >> gradle.properties
          echo "signing.key.password=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties

      - name: Build signed APK
        run: ./gradlew assembleRelease --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-androidtv-luxia-theme-signed
          path: app/build/outputs/apk/release/*.apk
